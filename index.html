<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>RC BOAT PRO</title>

<style>

/* ===== GLOBAL ===== */
html,body{
  margin:0;
  padding:0;
  background:#000;
  font-family:Arial;
  height:100dvh;
  overflow:hidden; /* no scroll */
  -webkit-user-select:none;
  user-select:none;
}

/* ROTATE MESSAGE */
#rotateMessage{
  position:fixed;
  inset:0;
  background:#000;
  color:#fff;
  display:none;
  justify-content:center;
  align-items:center;
  text-align:center;
  font-size:22px;
  z-index:9999;
}
@media (orientation:portrait){
  #rotateMessage{ display:flex; }
}

/* MAIN REMOTE */
.remote{
  width:100%;
  height:100dvh;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  box-sizing:border-box;
  background:linear-gradient(90deg,#111,#222,#111);
}

.section{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}

.big-btn{
  width:170px;
  height:110px;
  border-radius:20px;
  font-size:24px;
  font-weight:bold;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  transition:0.1s;
  box-shadow:0 8px #000;
}

.big-btn.active{
  box-shadow:0 0 25px #00ff88;
  filter:brightness(1.3);
}

.big-btn:active{
  transform:translateY(6px);
  box-shadow:0 2px #000;
}

.forward{ background:#2ECC40; }
.backward{ background:#FF4136; }
.left{ background:#FF851B; }
.right{ background:#FFDC00; color:black; }

/* CENTER PANEL */
.center-panel{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
}

/* LED */
.led-row{ display:flex; gap:10px; }

.led{
  width:14px;
  height:14px;
  border-radius:50%;
  background:#222;
}

.led.on{
  background:#2ECC40;
  box-shadow:0 0 12px #2ECC40;
}

.blink{
  animation:blinkAnim 1s infinite;
}
@keyframes blinkAnim{
  0%{opacity:0.3;}
  50%{opacity:1;}
  100%{opacity:0.3;}
}

/* RPM PANEL */
.rpm-panel{
  width:240px;
  background:#111;
  padding:10px;
  border-radius:15px;
  text-align:center;
  color:#00ffcc;
}

.gauge{
  width:200px;
  height:110px;
  border-top-left-radius:200px;
  border-top-right-radius:200px;
  background:radial-gradient(circle at center bottom,#333 0%,#111 70%);
  position:relative;
  margin:auto;
  overflow:hidden;
}

.needle{
  width:4px;
  height:100px;
  background:red;
  position:absolute;
  bottom:0;
  left:50%;
  transform-origin:bottom;
  transform:rotate(-90deg);
  transition:0.1s linear;
}

/* FUEL */
.fuel-panel{
  width:240px;
  background:#111;
  padding:8px;
  border-radius:15px;
  text-align:center;
  color:#FFDC00;
}
.fuel-bar{
  width:100%;
  height:10px;
  background:#222;
  border-radius:10px;
}
.fuel-fill{
  height:100%;
  width:100%;
  background:linear-gradient(90deg,#2ECC40,#00ff99);
}

/* BUTTONS */
.button-row{
  width:250px;
  display:flex;
  justify-content:space-between;
}

.ctrl{
  width:120px;
  height:36px;
  border-radius:20px;
  background:#222;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:13px;
  cursor:pointer;
}

.ctrl.active{
  background:#2ECC40;
  color:black;
  box-shadow:0 0 15px #2ECC40;
}

.small-btn{
  width:85px;
  height:28px;
  font-size:10px;
  border-radius:15px;
  background:#1a1a1a;
  color:#ccc;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.small-btn.active{
  background:#2ECC40;
  color:black;
  box-shadow:0 0 10px #2ECC40;
}

.bridge-row{
  width:260px;
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:5px;
}

</style>
</head>

<body>

<div id="rotateMessage">
⚠ Please rotate your device to Landscape Mode
</div>

<div class="remote">

<!-- LEFT -->
<div class="section">
  <div class="big-btn forward" id="forwardBtn">FORWARD</div>
  <div class="big-btn backward" id="backBtn">BACK</div>
</div>

<!-- CENTER -->
<div class="center-panel">

<div class="led-row">
  <div id="powerLed" class="led"></div>
  <div id="navLed" class="led"></div>
  <div id="radarLed" class="led"></div>
  <div id="bilgeLed" class="led"></div>
</div>

<div class="rpm-panel">
  ENGINE RPM
  <div><span id="rpmValue">0</span> RPM</div>
  <div class="gauge">
    <div class="needle" id="needle"></div>
  </div>
</div>

<div class="fuel-panel">
  FUEL
  <div class="fuel-bar">
    <div class="fuel-fill"></div>
  </div>
</div>

<div class="button-row">
  <div class="ctrl" id="engineBtn">ENGINE</div>
  <div class="ctrl" id="navBtn">NAV LIGHTS</div>
</div>

<div class="bridge-row">
  <div class="small-btn" id="testBtn">TEST</div>
  <div class="small-btn" id="autoBtn">AUTO</div>
  <div class="small-btn" id="radarBtn">RADAR</div>
  <div class="small-btn" id="bilgeBtn">BILGE</div>
  <div class="small-btn" id="deckBtn">DECK</div>
  <div class="small-btn" id="cabinBtn">CABIN</div>
</div>

</div>

<!-- RIGHT -->
<div class="section">
  <div class="big-btn left" id="leftBtn">LEFT</div>
  <div class="big-btn right" id="rightBtn">RIGHT</div>
</div>

</div>

<script>

const ESP32_IP="172.27.4.37";
function send(cmd){
 fetch(`http://${ESP32_IP}/command?cmd=${cmd}`).catch(()=>{});
}

let rpm=0,targetRPM=0,engineOn=false;

setInterval(()=>{
 if(rpm<targetRPM) rpm+=60;
 else if(rpm>targetRPM) rpm-=40;
 if(rpm<0) rpm=0;

 document.getElementById("rpmValue").innerText=Math.round(rpm);
 let angle=(rpm/6000)*180-90;
 document.getElementById("needle").style.transform="rotate("+angle+"deg)";
},40);

function setupPress(id,cmd){
 let btn=document.getElementById(id);

 btn.addEventListener("mousedown",()=>{ if(engineOn){ btn.classList.add("active"); targetRPM=4500; send(cmd);} });
 btn.addEventListener("mouseup",()=>{ btn.classList.remove("active"); targetRPM=1000; send("STOP"); });

 btn.addEventListener("touchstart",(e)=>{ e.preventDefault(); if(engineOn){ btn.classList.add("active"); targetRPM=4500; send(cmd);} });
 btn.addEventListener("touchend",(e)=>{ e.preventDefault(); btn.classList.remove("active"); targetRPM=1000; send("STOP"); });
}

setupPress("forwardBtn","F");
setupPress("backBtn","B");
setupPress("leftBtn","L");
setupPress("rightBtn","R");

document.getElementById("engineBtn").onclick=function(){
 engineOn=!engineOn;
 this.classList.toggle("active");
 document.getElementById("powerLed").classList.toggle("on");
 send(engineOn?"E_ON":"E_OFF");
 targetRPM=engineOn?1000:0;
};

document.getElementById("navBtn").onclick=function(){
 this.classList.toggle("active");
 document.getElementById("navLed").classList.toggle("blink");
 send(this.classList.contains("active")?"N_ON":"N_OFF");
};

document.getElementById("testBtn").onclick=function(){
 this.classList.toggle("active");
 send("F_S");
};

["radarBtn","bilgeBtn","autoBtn","deckBtn","cabinBtn"].forEach(id=>{
 document.getElementById(id).onclick=function(){
   this.classList.toggle("active");
 };
});

</script>

</body>
</html>
