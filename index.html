<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>RC BOAT PRO</title>

<style>

/* ===== GLOBAL ===== */
html,body{
  margin:0;
  padding:0;
  background:#000;
  font-family:Arial;
  height:100%;
  overflow:hidden;
  -webkit-user-select:none;
  user-select:none;
}

/* ROTATE MESSAGE */
#rotateMessage{
  position:fixed;
  inset:0;
  background:#000;
  color:#fff;
  display:none;
  justify-content:center;
  align-items:center;
  text-align:center;
  font-size:20px;
  z-index:9999;
  padding:20px;
}

/* MAIN CONTAINER */
.remote{
  width:100vw;
  height:100vh;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:2vh;
  box-sizing:border-box;
  background:linear-gradient(90deg,#111,#222,#111);
}

/* SIDE SECTIONS */
.section{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:3vh;
  width:25%;
}

/* CENTER PANEL */
.center-panel{
  width:50%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2vh;
}

/* BIG BUTTONS */
.big-btn{
  width:90%;
  height:18vh;
  border-radius:2vh;
  font-size:3vh;
  font-weight:bold;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  box-shadow:0 1vh #000;
  transition:0.1s;
}

.big-btn:active{
  transform:translateY(0.7vh);
  box-shadow:0 0.2vh #000;
}

.forward{ background:#2ECC40; }
.backward{ background:#FF4136; }
.left{ background:#FF851B; }
.right{ background:#FFDC00; color:black; }

/* PANELS */
.rpm-panel,.fuel-panel{
  width:90%;
  background:#111;
  padding:1vh;
  border-radius:2vh;
  text-align:center;
}

.rpm-panel{ color:#00ffcc; }
.fuel-panel{ color:#FFDC00; }

.gauge{
  width:80%;
  height:12vh;
  border-top-left-radius:50vh;
  border-top-right-radius:50vh;
  background:#222;
  position:relative;
  margin:auto;
  overflow:hidden;
}

.needle{
  width:0.5vh;
  height:12vh;
  background:red;
  position:absolute;
  bottom:0;
  left:50%;
  transform-origin:bottom;
  transform:rotate(-90deg);
  transition:0.1s;
}

.fuel-bar{
  width:100%;
  height:1.5vh;
  background:#222;
  border-radius:1vh;
  overflow:hidden;
}

.fuel-fill{
  height:100%;
  width:100%;
  background:#2ECC40;
}

/* BUTTON ROW */
.button-row{
  width:90%;
  display:flex;
  justify-content:space-between;
}

.ctrl{
  width:48%;
  height:5vh;
  border-radius:3vh;
  background:#222;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:1.8vh;
}

.ctrl.active{
  background:#2ECC40;
  box-shadow:0 0 15px #2ECC40;
}

/* LEDS */
.led-row{
  display:flex;
  gap:2vh;
}

.led{
  width:2vh;
  height:2vh;
  border-radius:50%;
  background:#222;
}

.blink{
  animation:blink 1s infinite;
}

@keyframes blink{
  0%{opacity:0.2;}
  50%{opacity:1;}
  100%{opacity:0.2;}
}

/* FORCE LANDSCAPE */
@media (orientation:portrait){
  #rotateMessage{ display:flex; }
}

</style>
</head>

<body>

<div id="rotateMessage">
⚠ Rotate your device to LANDSCAPE to use RC BOAT PRO
</div>

<div class="remote">

<div class="section">
  <div class="big-btn forward" id="forwardBtn">FORWARD</div>
  <div class="big-btn backward" id="backBtn">BACK</div>
</div>

<div class="center-panel">

<div class="led-row">
  <div id="powerLed" class="led" style="background:red"></div>
  <div id="navLed" class="led" style="background:#00c3ff"></div>
  <div id="engineLed" class="led" style="background:#2ECC40"></div>
</div>

<div class="rpm-panel">
  ENGINE RPM
  <div><span id="rpmValue">0</span> RPM</div>
  <div class="gauge">
    <div class="needle" id="needle"></div>
  </div>
</div>

<div class="fuel-panel">
  FUEL
  <div class="fuel-bar">
    <div class="fuel-fill"></div>
  </div>
</div>

<div class="button-row">
  <div class="ctrl" id="engineBtn">ENGINE</div>
  <div class="ctrl" id="navBtn">NAV LIGHTS</div>
</div>

</div>

<div class="section">
  <div class="big-btn left" id="leftBtn">LEFT</div>
  <div class="big-btn right" id="rightBtn">RIGHT</div>
</div>

</div>

<script>

/* ===== ESP ===== */
const ESP32_IP="172.27.4.37";
function send(cmd){
 fetch(`http://${ESP32_IP}/command?cmd=${cmd}`).catch(()=>{});
}

/* ENGINE */
let rpm=0,targetRPM=0,engineOn=false;

setInterval(()=>{
 if(rpm<targetRPM) rpm+=80;
 else if(rpm>targetRPM) rpm-=60;
 if(rpm<0) rpm=0;
 document.getElementById("rpmValue").innerText=Math.round(rpm);
 let angle=(rpm/6000)*180-90;
 document.getElementById("needle").style.transform="rotate("+angle+"deg)";
},40);

/* TOUCH + MOUSE SUPPORT */
function press(cmd){
 if(!engineOn) return;
 targetRPM=4500;
 send(cmd);
}

function release(){
 if(engineOn) targetRPM=1000;
 send("STOP");
}

["forwardBtn","backBtn","leftBtn","rightBtn"].forEach(id=>{
 let btn=document.getElementById(id);
 btn.addEventListener("mousedown",()=>press(btn.innerText[0]));
 btn.addEventListener("mouseup",release);
 btn.addEventListener("touchstart",(e)=>{e.preventDefault();press(btn.innerText[0]);});
 btn.addEventListener("touchend",(e)=>{e.preventDefault();release();});
});

/* ENGINE TOGGLE */
document.getElementById("engineBtn").onclick=function(){
 engineOn=!engineOn;
 this.classList.toggle("active");
 document.getElementById("powerLed").style.background=engineOn?"#2ECC40":"red";
 send(engineOn?"E_ON":"E_OFF");
 targetRPM=engineOn?1000:0;
};

</script>

</body>
</html>
