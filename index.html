<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RC BOAT PRO</title>

<style>
html,body{
  margin:0;
  padding:0;
  background:#000;
  font-family:Arial;
  overflow:hidden;
  height:100vh;
  width:100vw;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

/* MAIN LAYOUT */
.remote{
  width:100vw;
  height:100vh;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:2vh;
  box-sizing:border-box;
}

/* SIDE CONTROL */
.side{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2vh;
  width:25vw;
}

/* CENTER PANEL */
.panel{
  width:40vw;
  height:90vh;
  background:linear-gradient(145deg,#111,#1c1c1c);
  border-radius:20px;
  box-shadow:
    inset 0 0 30px #000,
    0 0 20px #00bfff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-evenly;
  padding:2vh;
  box-sizing:border-box;
}

/* BIG CONTROL BUTTONS */
.btn{
  width:70%;
  padding:2vh;
  font-size:2vh;
  border:none;
  border-radius:15px;
  background:#222;
  color:white;
  box-shadow:0 0 10px #000;
  transition:0.2s;
}

.btn:active{
  transform:scale(0.95);
}

.active{
  background:#00ff88 !important;
  box-shadow:0 0 20px #00ff88;
  color:black;
}

/* SMALL BRIDGE BUTTONS */
.small-btn{
  width:80%;
  padding:1vh;
  font-size:1.5vh;
  border:none;
  border-radius:10px;
  background:#333;
  color:white;
  transition:0.2s;
}

.small-btn.active{
  background:#00ccff;
  box-shadow:0 0 15px #00ccff;
}

/* ROUND GAP BUTTONS */
.circle{
  width:60px;
  height:60px;
  border-radius:50%;
  background:#222;
  border:none;
  color:white;
  font-size:1.8vh;
  box-shadow:0 0 15px #000;
  transition:0.2s;
}

.circle.active{
  background:#ffcc00;
  box-shadow:0 0 20px #ffcc00;
  color:black;
}

/* AUTO MANUAL TOGGLE */
.toggle{
  width:80%;
  display:flex;
  border-radius:30px;
  overflow:hidden;
  border:2px solid #00bfff;
}

.toggle button{
  flex:1;
  padding:1vh;
  background:#111;
  color:white;
  border:none;
  font-size:1.6vh;
}

.toggle .selected{
  background:#00bfff;
  color:black;
}

/* 3D ANALOG */
.analog{
  width:180px;
  height:180px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#444,#111);
  box-shadow:
    inset -10px -10px 20px #000,
    inset 10px 10px 20px #333,
    0 0 20px #00bfff;
  position:relative;
}

.needle{
  width:6px;
  height:70px;
  background:red;
  position:absolute;
  bottom:50%;
  left:50%;
  transform-origin:bottom;
  transform:translateX(-50%) rotate(0deg);
  border-radius:3px;
}

/* blinking nav light */
.blink{
  animation:blink 1s infinite;
}

@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}

</style>
</head>

<body>

<div class="remote">

  <!-- LEFT SIDE -->
  <div class="side">
    <button class="btn" onclick="toggle(this)">LEFT</button>
    <button class="circle" onclick="toggle(this)">C1</button>
    <button class="btn" onclick="toggle(this)">RIGHT</button>
  </div>

  <!-- CENTER PANEL -->
  <div class="panel">

    <h2>⚓ RC BOAT PRO</h2>

    <div class="analog">
      <div class="needle" id="needle"></div>
    </div>

    <!-- AUTO MANUAL -->
    <div class="toggle">
      <button id="manual" class="selected" onclick="selectMode('manual')">MANUAL</button>
      <button id="auto" onclick="selectMode('auto')">AUTO</button>
    </div>

    <!-- MAIN BUTTONS -->
    <button class="small-btn" onclick="toggle(this)">ENGINE</button>
    <button class="small-btn blink" onclick="toggle(this)">NAV LIGHT</button>
    <button class="small-btn" onclick="toggle(this)">ANCHOR</button>
    <button class="small-btn" onclick="toggle(this)">HORN</button>
    <button class="small-btn" onclick="toggle(this)">TEST</button>
    <button class="small-btn" onclick="toggle(this)">CHECK</button>

  </div>

  <!-- RIGHT SIDE -->
  <div class="side">
    <button class="btn" onclick="toggle(this)">FWD</button>
    <button class="circle" onclick="toggle(this)">C2</button>
    <button class="btn" onclick="toggle(this)">BWD</button>
  </div>

</div>

<script>

/* Toggle buttons glow */
function toggle(el){
  el.classList.toggle("active");
}

/* Auto Manual selection */
function selectMode(mode){
  document.getElementById("manual").classList.remove("selected");
  document.getElementById("auto").classList.remove("selected");

  if(mode==="manual"){
    document.getElementById("manual").classList.add("selected");
  }else{
    document.getElementById("auto").classList.add("selected");
  }
}

/* Analog animation */
let angle=0;
setInterval(()=>{
  angle+=5;
  if(angle>180) angle=0;
  document.getElementById("needle").style.transform=
  "translateX(-50%) rotate("+angle+"deg)";
},200);

</script>

</body>
</html>
