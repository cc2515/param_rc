<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RC BOAT BRIDGE</title>

<style>
html,body{
  margin:0;
  padding:0;
  height:100vh;
  width:100vw;
  overflow:hidden;
  background:#000;
  font-family:Arial;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* MAIN LAYOUT */
.remote{
  width:100vw;
  height:100vh;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:2vh;
  box-sizing:border-box;
}

/* SIDE CONTROLS */
.side{
  width:30vw;
  height:90vh;
  display:flex;
  flex-direction:column;
  justify-content:space-evenly;
  align-items:center;
}

/* BIG NAV BUTTONS */
.big-btn{
  width:80%;
  height:18vh;
  border:none;
  border-radius:25px;
  font-size:3vh;
  background:#111;
  color:white;
  box-shadow:0 0 15px #000;
  transition:0.2s;
}

.big-btn.active{
  background:#00ff88;
  color:black;
  box-shadow:0 0 25px #00ff88;
}

/* CENTER PANEL (SMALLER NOW) */
.panel{
  width:35vw;
  height:75vh;
  background:linear-gradient(145deg,#111,#1b1b1b);
  border-radius:25px;
  box-shadow:
    inset 0 0 30px #000,
    0 0 20px #00bfff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-evenly;
  padding:2vh;
  box-sizing:border-box;
}

/* RPM GAUGE */
.gauge{
  width:180px;
  height:180px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#333,#000);
  position:relative;
  box-shadow:
    inset -10px -10px 25px #000,
    inset 10px 10px 25px #222,
    0 0 20px #00bfff;
}

.needle{
  width:6px;
  height:70px;
  background:red;
  position:absolute;
  bottom:50%;
  left:50%;
  transform-origin:bottom;
  transform:translateX(-50%) rotate(-90deg);
  border-radius:3px;
}

.rpm-text{
  position:absolute;
  bottom:15px;
  width:100%;
  text-align:center;
  font-size:2vh;
}

/* SMALL RECT BUTTON */
.rect-btn{
  width:80%;
  padding:1vh;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
  font-size:1.6vh;
}

.rect-btn.active{
  background:#00ccff;
  box-shadow:0 0 15px #00ccff;
  color:black;
}

/* ROUND ON/OFF BUTTON */
.round-btn{
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  background:#222;
  color:white;
  font-size:1.4vh;
}

.round-btn.active{
  background:#ffcc00;
  box-shadow:0 0 20px #ffcc00;
  color:black;
}

/* SWITCH STYLE */
.switch{
  position:relative;
  width:70px;
  height:30px;
}

.switch input{
  display:none;
}

.slider{
  position:absolute;
  cursor:pointer;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:#444;
  border-radius:30px;
  transition:0.3s;
}

.slider:before{
  position:absolute;
  content:"";
  height:24px;
  width:24px;
  left:3px;
  bottom:3px;
  background:white;
  border-radius:50%;
  transition:0.3s;
}

input:checked + .slider{
  background:#00ff88;
}

input:checked + .slider:before{
  transform:translateX(40px);
}

.mode-label{
  font-size:1.6vh;
}

</style>
</head>

<body>

<div class="remote">

  <!-- LEFT SIDE (FWD / BWD) -->
  <div class="side">
    <button class="big-btn" onclick="press(this,1)">FWD</button>
    <button class="big-btn" onclick="press(this,-1)">BWD</button>
  </div>

  <!-- CENTER PANEL -->
  <div class="panel">

    <h3>⚓ ENGINE RPM</h3>

    <div class="gauge">
      <div class="needle" id="needle"></div>
      <div class="rpm-text" id="rpmText">0 RPM</div>
    </div>

    <!-- AUTO MANUAL SWITCH -->
    <div>
      <span class="mode-label">MANUAL</span>
      <label class="switch">
        <input type="checkbox" id="modeSwitch">
        <span class="slider"></span>
      </label>
      <span class="mode-label">AUTO</span>
    </div>

    <!-- RECT BUTTONS -->
    <button class="rect-btn" onclick="toggle(this)">ENGINE</button>
    <button class="rect-btn" onclick="toggle(this)">NAV LIGHT</button>
    <button class="rect-btn" onclick="toggle(this)">ANCHOR</button>
    <button class="rect-btn" onclick="toggle(this)">TEST</button>

    <!-- ROUND BUTTONS -->
    <div style="display:flex; gap:20px;">
      <button class="round-btn" onclick="toggle(this)">HORN</button>
      <button class="round-btn" onclick="toggle(this)">CHK</button>
    </div>

  </div>

  <!-- RIGHT SIDE (LEFT / RIGHT TURN) -->
  <div class="side">
    <button class="big-btn" onclick="toggle(this)">LEFT</button>
    <button class="big-btn" onclick="toggle(this)">RIGHT</button>
  </div>

</div>

<script>

let rpm=0;
let direction=0;

function toggle(el){
  el.classList.toggle("active");
}

function press(el,dir){
  document.querySelectorAll(".big-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  direction=dir;
}

setInterval(()=>{
  if(direction===1 && rpm<5000) rpm+=100;
  if(direction===-1 && rpm>0) rpm-=100;

  let angle=(rpm/5000)*180-90;
  document.getElementById("needle").style.transform=
  "translateX(-50%) rotate("+angle+"deg)";
  document.getElementById("rpmText").innerText=rpm+" RPM";
},100);

</script>

</body>
</html>
